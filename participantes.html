<html lang="es">
<head>

<title>Participantes</title>

<link rel="stylesheet" href="estilos.css">

<style>

.contenedor{
    max-width:900px;

    background:white;

    padding:30px;

    width:100%;

<button onclick="agregarParticipante()">

Guardar

</button>

<table>
